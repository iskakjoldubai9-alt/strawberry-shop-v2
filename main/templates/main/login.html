<!DOCTYPE html>
<html lang="kg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кирүү • Instagrаm</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #262626;
        }

        .main-container {
            width: 350px;
        }

        .login-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 10px 40px;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo-text {
            font-family: 'Lobster', cursive;
            font-size: 50px;
            margin: 25px 0;
            font-weight: normal;
            color: #262626;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            height: 38px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px;
            margin-bottom: 6px;
            font-size: 12px;
            width: 100%;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        .btn-login {
            background-color: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            padding: 7px 9px;
            margin: 8px 0;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-login:hover {
            background-color: #1877f2;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }

        .divider div {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider span {
            padding: 0 15px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .fb-login-btn {
            background: none;
            border: none;
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }

        /* КАТА БИЛДИРҮҮ СТИЛИ */
        .error-msg {
            color: #ed4956;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 18px;
        }

        .signup-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .get-app {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .app-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .app-btn-img {
            height: 40px;
            transition: transform 0.1s ease;
        }

        .app-btn-img:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="login-box">
            <div class="logo-text">Instа<span>grаm</div>
            
            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %} <input type="text" name="username" placeholder="Телефон, колдонуучу аты же электрондук почта" required>
                <input type="password" name="password" placeholder="Сырсөз" required>
                
                <button type="submit" class="btn-login">Кирүү</button>
            </form>

            <div class="divider">
                <div></div>
                <span>ЖЕ</span>
                <div></div>
            </div>

            <button type="button" class="fb-login-btn">Facebook менен кирүү</button>
            <a href="#" class="forgot-password">Сырсөздү унутуп калдыңызбы?</a>
        </div>

        <div class="signup-box">
            Аккаунтуңуз жокпу? <a href="#">Катталуу</a>
        </div>

        <div class="get-app">
            <p>Тиркемени орнотуңуз.</p>
            <div class="app-links">
                <a href="https://apps.apple.com/app/instagram/id389801252" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" 
                         alt="App Storeдон жүктөө" class="app-btn-img">
                </a>
                
                <a href="https://play.google.com/store/apps/details?id=com.instagram.android" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" 
                         alt="Google Playден жүктөө" class="app-btn-img">
                </a>
            </div>
        </div>
    </div>

</body>
</html>
